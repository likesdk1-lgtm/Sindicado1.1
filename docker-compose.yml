version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: dksind_redis
    restart: always
    networks:
      - dksind_network

  evolution:
    image: atendai/evolution-api:v1.7.1
    container_name: evolution_api
    restart: always
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-SINDICATO_TOKEN}
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
    depends_on:
      - redis
    networks:
      - dksind_network

  app:
    build: .
    container_name: dksind_app
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/data/dev.db}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://vps66230.publiccloud.com.br}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://vps66230.publiccloud.com.br}
      - NEXT_PUBLIC_EVOLUTION_URL=${NEXT_PUBLIC_EVOLUTION_URL:-https://vps66230.publiccloud.com.br/evolution}
      - EVOLUTION_URL=${EVOLUTION_URL:-http://evolution:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-SINDICATO_TOKEN}
    volumes:
      - sqlite_data:/data
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      - evolution
    networks:
      - dksind_network

  caddy:
    image: caddy:2-alpine
    container_name: dksind_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - dksind_network

networks:
  dksind_network:
    driver: bridge

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
